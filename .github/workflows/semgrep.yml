name: Semgrep

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest  # ✅ Latest version
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/javascript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --no-error  # ✅ Exit code 1 nahi aayega
        
      - name: Upload Results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
